# Render Blueprint — persistent disk keeps database + uploads across redeploys.
# Disks require a paid plan (Starter or higher).
services:
  - type: web
    name: root-cause-website
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --graceful-timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.3
    disk:
      name: rootcause-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1