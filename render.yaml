# Render Blueprint — persistent disk keeps database + uploads across redeploys.
# REQUIRED: Starter plan or higher + disk "rootcause-data" mounted below.
# In the Render dashboard, confirm Environment has DATA_DIR and Disk is attached.
# Without both, every git push redeploy wipes client logins, reports, and uploads.
services:
  - type: web
    name: root-cause-website
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --graceful-timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.3
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SITE_URL
        value: https://www.root-cause-test.com
    disk:
      name: rootcause-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1