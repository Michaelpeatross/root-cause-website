<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Root Cause</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; }
        .container { max-width: 500px; margin: 80px auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        .btn { background: #1a8c7a; color: white; padding: 14px; width: 100%; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        .btn:hover { background: #0b3d2a; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 6px; background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#0b3d2a;">Login to Your Portal</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        
        <p style="text-align:center; margin-top:1.5rem;">
            No account? <a href="/register">Register here</a>
        </p>
    </div>
</body>
</html>
