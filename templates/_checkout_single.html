{# One-click checkout — single $199 scan only #}
<form method="POST" action="{{ url_for('create_checkout') }}" class="checkout-single-form">
    <input type="hidden" name="product" value="single">
    {% if user_email %}
    <input type="hidden" name="email" value="{{ user_email }}">
    {% endif %}
    <button type="submit" class="btn btn-primary checkout-single-btn">
        {{ button_text or 'Continue to Secure Checkout — $199' }}
    </button>
</form>
<p class="purchase-methods">
    <strong>Credit card</strong> · <strong>Apple Pay</strong> · <strong>Google Pay</strong> · <strong>Stripe Link</strong>
</p>
