<!DOCTYPE html>
<html>
<head><title>Admin - Root Cause</title>
<style>body{font-family:Arial; padding:20px;} table{border-collapse:collapse; width:100%;} th,td{border:1px solid #ddd; padding:8px;}</style>
</head>
<body>
    <h1>Admin Panel - Upload Reports</h1>
    <form method="POST">
        <input type="text" name="email" placeholder="Client Email" required><br><br>
        <input type="text" name="title" placeholder="Report Title" required><br><br>
        <textarea name="content" rows="10" cols="80" placeholder="Paste full report content here" required></textarea><br><br>
        <button type="submit">Upload Report</button>
    </form>

    <h2>All Reports</h2>
    <table>
        <tr><th>Client</th><th>Title</th><th>Date</th></tr>
        {% for r in reports %}
        <tr><td>{{ r.user_email }}</td><td>{{ r.title }}</td><td>{{ r.date }}</td></tr>
        {% endfor %}
    </table>
    <a href="/">Back to Home</a>
</body>
</html>
