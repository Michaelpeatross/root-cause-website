<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy - Root Cause</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f8f9fa; }
        .container { max-width: 700px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .price { font-size: 3rem; font-weight: bold; color: #0b3d2a; }
        .btn { background: #1a8c7a; color: white; padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 1rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">Complete Your Purchase</h2>
        
        <div style="text-align:center; margin: 2rem 0;">
            <span class="price">$229</span><br>
            <span style="font-size:1.4rem; color:#1a8c7a;">→ $199 after discount</span>
        </div>

        <input type="text" id="coupon" placeholder="Enter Coupon Code (optional)">
        <button onclick="applyCoupon()" style="background:#0b3d2a; color:white; padding:10px; width:100%; border:none; border-radius:6px;">Apply Code</button>

        <a href="/register" class="btn" style="margin-top:20px;">Continue to Checkout</a>
        
        <p style="text-align:center; margin-top:2rem; color:#555;">
            Secure checkout powered by Stripe
        </p>
    </div>

    <script>
        function applyCoupon() {
            const code = document.getElementById('coupon').value.trim().toUpperCase();
            if (code === "WELCOME50") {
                alert("✅ WELCOME50 applied! Your scan is now FREE ($229 value).");
            } else if (code !== "") {
                alert("Invalid code. Contact us for special offers.");
            }
        }
    </script>
</body>
</html>
