{% extends "base.html" %}
{% block title %}Register — Root Cause{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<div class="container" style="max-width:480px; margin-top:4rem;">
    <div class="card">
        <h2 style="text-align:center; font-family:'Playfair Display',serif; color:var(--green-dark);">Create Your Account</h2>

        <form method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>

        <p style="text-align:center; margin-top:1.5rem;">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
